<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深圳龙岗区中学录取积分可视化平台 | 2023-2025真实数据</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .card-shadow { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
            .table-hover tr:hover { background-color: #f0f7ff; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-blue-600 text-white py-4 px-6 card-shadow">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold">龙岗区初一录取积分可视化平台（2023-2025真实数据）</h1>
            <div class="flex gap-4 items-center">
                <span class="text-sm opacity-90">数据源：23-25年官方录取积分表 | 覆盖6大街道</span>
                <a href="#" class="bg-white text-blue-600 px-3 py-1 rounded text-sm font-medium">数据说明</a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-6">
        <!-- 筛选控制区 -->
        <section class="bg-white rounded-lg p-5 mb-6 card-shadow">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div>
                    <label class="block mb-2 font-medium text-gray-700">选择街道</label>
                    <select id="streetSelect" class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-blue-500">
                        <option value="longcheng">龙城街道</option>
                        <option value="longgang">龙岗街道</option>
                        <option value="bantian">坂田街道</option>
                        <option value="henggang">横岗园山街道</option>
                        <option value="pinghu">平湖街道</option>
                        <option value="buji">布吉吉华街道</option>
                    </select>
                </div>
                <div>
                    <label class="block mb-2 font-medium text-gray-700">查看年份范围</label>
                    <select id="yearRange" class="w-full border border-gray-300 rounded px-3 py-2">
                        <option value="all">2023-2025 全部</option>
                        <option value="2023">仅2023</option>
                        <option value="2024">仅2024</option>
                        <option value="2025">仅2025</option>
                    </select>
                </div>
                <div class="flex items-end">
                    <button id="refreshBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded transition">切换街道刷新图表</button>
                </div>
            </div>
        </section>

        <!-- 核心指标卡片 -->
        <section class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white p-4 rounded-lg card-shadow">
                <p class="text-gray-500 text-sm">当前街道中学总数</p>
                <h2 id="schoolTotal" class="text-3xl font-bold text-blue-600 mt-2">0</h2>
            </div>
            <div class="bg-white p-4 rounded-lg card-shadow">
                <p class="text-gray-500 text-sm">2025年街道平均积分</p>
                <h2 id="avgScore" class="text-3xl font-bold text-emerald-600 mt-2">0</h2>
            </div>
            <div class="bg-white p-4 rounded-lg card-shadow">
                <p class="text-gray-500 text-sm">2025年街道最高积分</p>
                <h2 id="maxScore" class="text-3xl font-bold text-orange-600 mt-2">0</h2>
            </div>
            <div class="bg-white p-4 rounded-lg card-shadow">
                <p class="text-gray-500 text-sm">三年涨幅最大学校</p>
                <h2 id="maxUp" class="text-xl font-bold text-red-600 mt-2">--</h2>
            </div>
        </section>

        <!-- 图表区域 -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="bg-white p-4 rounded-lg card-shadow">
                <h3 class="font-bold text-lg mb-3 border-b pb-2">各校2023-2025积分趋势折线</h3>
                <div id="trendChart" style="width:100%;height:380px;"></div>
            </div>
            <div class="bg-white p-4 rounded-lg card-shadow">
                <h3 class="font-bold text-lg mb-3 border-b pb-2">街道年度平均分/最高分/最低分对比</h3>
                <div id="yearCompareChart" style="width:100%;height:380px;"></div>
            </div>
        </section>

        <!-- 学校积分明细表格 -->
        <section class="bg-white rounded-lg p-5 card-shadow overflow-x-auto">
            <h3 id="tableTitle" class="font-bold text-lg mb-4 border-b pb-2">龙城街道初中2023-2025录取积分明细</h3>
            <table class="w-full table-hover text-sm">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="border px-3 py-2 text-left">学校名称</th>
                        <th class="border px-3 py-2 text-center">2023积分</th>
                        <th class="border px-3 py-2 text-center">2024积分</th>
                        <th class="border px-3 py-2 text-center">2025积分</th>
                        <th class="border px-3 py-2 text-center">23-25总分涨幅</th>
                        <th class="border px-3 py-2 text-center">走势</th>
                    </tr>
                </thead>
                <tbody id="scoreTableBody"></tbody>
            </table>
        </section>
    </main>

    <footer class="mt-10 py-4 text-center text-gray-500 text-sm border-t">
        龙岗区初一录取积分可视化平台 | 数据来源：2023-2025龙岗初中录取积分统计表
    </footer>

    <script>

            henggang: [

                {name:"盛义九年一贯制学校",y2023:68.5,y2024:68.5,y2025:68.5}
            ],
            pinghu: [
                {name:"平湖中学",y2023:65.25,y2024:66.2,y2025:67.05},
                {name:"信德学校",y2023:84.3,y2024:81.05,y2025:84.3},
                {name:"平湖中心学校",y2023:63.6,y2024:67.6,y2025:68.5},
                {name:"华南师范平湖学校",y2023:63.6,y2024:64.08,y2025:64.8},
                {name:"平湖外国语学校",y2023:64.65,y2024:65.85,y2025:67.4},
                {name:"崇真学校",y2023:64,y2024:70,y2025:70},

                {name:"深圳外国语龙岗学校",y2023:103.15,y2024:97.75,y2025:97.75}
            ],
            buji: [
                {name:"布吉中学",y2023:67.15,y2024:67,y2025:67.5},
                {name:"贤义外国语学校",y2023:104.55,y2024:105.9,y2025:107},
                {name:"可园学校",y2023:90,y2024:100.2,y2025:103.55},
                {name:"木棉湾学校",y2023:83.95,y2024:85.3,y2025:95},
                {name:"文理学校",y2023:90.5,y2024:94.05,y2025:94.1},
                {name:"龙岭公班",y2023:107.65,y2024:91.1,y2025:109.35},
                {name:"怡翠实验学校",y2023:104.4,y2024:101,y2025:104.25},
                {name:"甘李学校",y2023:66.9,y2024:67.4,y2025:67.45},
                {name:"吉华实验学校",y2023:68.85,y2024:85,y2025:89.3}
            ]
        };
        const streetNameMap = {
            longcheng:"龙城街道",
            longgang:"龙岗街道",
            bantian:"坂田街道",
            henggang:"横岗园山街道",
            pinghu:"平湖街道",
            buji:"布吉吉华街道"
        }

        let trendChartIns = null;
        let yearCompareChartIns = null;

        window.onload = function(){
            refreshAllData();
            bindEvent();
        }

        // 刷新整套页面数据（表格+指标+双图表）
        function refreshAllData(){
            const selectVal = document.getElementById('streetSelect').value;
            const currData = streetAllData[selectVal];
            const currStreetName = streetNameMap[selectVal];
            document.getElementById('tableTitle').innerText = `${currStreetName}初中2023-2025录取积分明细`;

            // 1. 渲染表格
            renderTable(currData);
            // 2. 计算顶部统计指标
            calcStatCard(currData);
            // 3. 重绘两张图表
            renderTrendChart(currData);
            renderYearCompareChart(currData);
        }

        // 渲染积分表格，计算23-25涨幅
        function renderTable(dataList){
            const tbody = document.getElementById('scoreTableBody');
            tbody.innerHTML = '';
            dataList.forEach(item=>{
                const upRate = (item.y2025 - item.y2023).toFixed(2);
                let rateClass, trendText;
                if(upRate > 0){
                    rateClass = 'text-red-600';
                    trendText = '↑上涨';
                }else if(upRate < 0){
                    rateClass = 'text-green-600';
                    trendText = '↓下跌';
                }else{
                    rateClass = 'text-gray-500';
                    trendText = '→持平';
                }
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="border px-3 py-2">${item.name}</td>
                    <td class="border px-3 py-2 text-center">${item.y2023}</td>
                    <td class="border px-3 py-2 text-center">${item.y2024}</td>
                    <td class="border px-3 py-2 text-center font-medium">${item.y2025}</td>
                    <td class="border px-3 py-2 text-center ${rateClass}">${upRate}分</td>
                    <td class="border px-3 py-2 text-center">${trendText}</td>
                `;
                tbody.appendChild(tr);
            })
        }

        // 计算顶部4个统计卡片数值
        function calcStatCard(dataList){
            const schoolCount = dataList.length;
            document.getElementById('schoolTotal').innerText = schoolCount;

            // 提取2025所有分数
            const score2025 = dataList.map(s=>s.y2025);
            const sum2025 = score2025.reduce((a,b)=>a+b,0);
            const avg2025 = (sum2025 / schoolCount).toFixed(2);
            const max2025 = Math.max(...score2025).toFixed(2);
            document.getElementById('avgScore').innerText = avg2025;
            document.getElementById('maxScore').innerText = max2025;

            // 找涨幅最大学校
            let maxUpNum = -999;
            let maxUpName = '';
            dataList.forEach(item=>{
                const diff = item.y2025 - item.y2023;
                if(diff > maxUpNum){
                    maxUpNum = diff;
                    maxUpName = item.name;
                }
            })
            document.getElementById('maxUp').innerText = `${maxUpName} +${maxUpNum}分`;
        }

        // 各校三年积分折线图
        function renderTrendChart(dataList){
            const dom = document.getElementById('trendChart');
            if(trendChartIns) trendChartIns.dispose();
            trendChartIns = echarts.init(dom);
            const xAxis = ['2023','2024','2025'];
            const series = dataList.map(school=>{
                return {
                    name: school.name,
                    type: 'line',
                    data: [school.y2023, school.y2024, school.y2025],
                    symbol: 'circle',
                    symbolSize: 3
                }
            })
            const option = {
                tooltip: {trigger: 'axis'},
                legend: {type: 'scroll', left: 0, bottom: 0, height: 80},
                grid: {left: '3%', right: '4%', bottom: '18%', containLabel: true},
                xAxis: {type: 'category', data: xAxis},
                yAxis: {type: 'value', name: '录取积分', min: 60},
                series: series
            }
            trendChartIns.setOption(option);
            window.addEventListener('resize',()=>trendChartIns.resize());
        }

        // 年度平均分/最高分/最低分柱状对比图
        function renderYearCompareChart(dataList){
            const dom = document.getElementById('yearCompareChart');
            if(yearCompareChartIns) yearCompareChartIns.dispose();
            yearCompareChartIns = echarts.init(dom);
            const years = [2023,2024,2025];
            const keyArr = ['y2023','y2024','y2025'];
            let avgList = [],maxList=[],minList=[];
            keyArr.forEach(k=>{
                const scores = dataList.map(s=>s[k]);
                const sum = scores.reduce((a,b)=>a+b,0);
                avgList.push((sum / scores.length).toFixed(2));
                maxList.push(Math.max(...scores).toFixed(2));
                minList.push(Math.min(...scores).toFixed(2));
            })
            const option = {
                tooltip: {trigger: 'axis'},
                legend: {data: ['平均分','最高分','最低分']},
                grid: {left: '3%', right: '4%', bottom: '10%', containLabel: true},
                xAxis: {type: 'category', data: years},
                yAxis: {type: 'value', name: '录取积分'},
                series: [
                    {name:'平均分',type:'bar',data:avgList,itemStyle:{color:'#3b82f6'}},
                    {name:'最高分',type:'bar',data:maxList,itemStyle:{color:'#f97316'}},
                    {name:'最低分',type:'bar',data:minList,itemStyle:{color:'#10b981'}}
                ]
            }
            yearCompareChartIns.setOption(option);
            window.addEventListener('resize',()=>yearCompareChartIns.resize());
        }

        // 绑定下拉、刷新按钮事件
        function bindEvent(){
            const refreshBtn = document.getElementById('refreshBtn');
            const streetSelect = document.getElementById('streetSelect');
            refreshBtn.addEventListener('click', refreshAllData);
            streetSelect.addEventListener('change', refreshAllData);
        }
    </script>
</body>
</html>
